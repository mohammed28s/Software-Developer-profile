services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_password
    ports:
      - "5432:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: portfolio-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/portfolio_db
      DB_USERNAME: portfolio_user
      DB_PASSWORD: portfolio_password
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - portfolio_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  portfolio_postgres_data:
  portfolio_uploads:
